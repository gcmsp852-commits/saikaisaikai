
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QRツイン リーダー（WASM/Worker版）</title>

  <meta name="apple-mobile-web-app-title" content="QRツイン">
  <meta name="application-name" content="QRツイン">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#121212">

  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0; padding: 0; background-color: #121212; color: #ffffff; text-align: center;
    }
    h2 { margin: 15px 0; font-size: 1.2rem; }
    #startScreen, #resultScreen { padding: 20px; margin-top: 50px; }
    #resultScreen { display: none; }
    .camera-container {
      position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #000; display: none;
    }
    video { width: 100%; display: block; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .status-panel {
      padding: 15px; background: #1e1e1e; border-top: 1px solid #333; text-align: left;
      max-width: 600px; margin: 0 auto; display: none;
    }
    .qr-result { margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #2c2c2c; word-break: break-all; }
    .qr-1 { border-left: 5px solid #00E676; }
    .qr-2 { border-left: 5px solid #29B6F6; }

    button {
      width: 100%; max-width: 300px; padding: 15px; font-size: 1.1rem; font-weight: bold;
      background: #6200EE; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px;
    }
    button:disabled { background: #555; cursor: not-allowed; color: #aaa; }
    #startBtn { background: #81C784; color: #121212; }
    #startBtn:active { background: #66BB6A; }
    #backBtn { background: #03DAC6; color: #000; margin-top: 30px; }
    #backBtn:active { background: #018786; }

    .small { font-size:.8rem;color:#aaa;margin-bottom:10px; }

    /* ★追加：管理部表示（モノスペース） */
    .mgmt {
      margin-top: 6px;
      padding: 8px;
      border-radius: 8px;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: .95rem;
      line-height: 1.4;
    }
    .mgmt b { color:#ffd54f; }
  </style>
</head>

<body>
  <h2>📱 QRツイン リーダー（WASM/Worker）</h2>

  <div id="startScreen">
    <p class="small">
      単体QRとして1個目を確実に取得 → その距離関係で2個目を探索します。<br>
      エンジン: zxing-wasm（ZXing-cpp WASM）+ Worker
    </p>
    <button id="startBtn" onclick="startApp()">📷 カメラを起動する</button>
    <div class="small" id="bootMsg"></div>
  </div>

  <div class="camera-container" id="cameraContainer">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="overlayCanvas"></canvas>
  </div>

  <div class="status-panel" id="statusPanel">
    <div class="small">
      🐢 エンジン: WASM（単体強化 → 距離探索） / Workerで重い処理を分離
    </div>

    <div class="qr-result qr-1">
      <strong>1個目:</strong> <span id="text1">未検出</span>
      <!-- ★追加：管理部16bit（1個目） -->
      <div class="mgmt"><b>管理部16bit:</b> <span id="mgmt1">未取得</span></div>
    </div>

    <div class="qr-result qr-2">
      <strong>2個目:</strong> <span id="text2">未検出</span>
      <!-- ★追加：管理部16bit（2個目） -->
      <div class="mgmt"><b>管理部16bit:</b> <span id="mgmt2">未取得</span></div>
    </div>

    <div class="small" id="perfMsg"></div>
  </div>

  <div id="resultScreen">
    <h3 style="color:#00E676;margin-bottom:20px;">✅ 読み取り完了！</h3>

    <div class="qr-result qr-1" style="text-align:left;">
      <strong>1個目:</strong><br><span id="finalText1"></span>
      <div class="mgmt"><b>管理部16bit:</b> <span id="finalMgmt1">未取得</span></div>
    </div>

    <div class="qr-result qr-2" style="text-align:left;">
      <strong>2個目:</strong><br><span id="finalText2"></span>
      <div class="mgmt"><b>管理部16bit:</b> <span id="finalMgmt2">未取得</span></div>
    </div>

    <button id="backBtn" onclick="goBack()">🔙 もとのカメラ画面に戻る</button>
  </div>

<script>
  // ==========
  // UI / Canvas
  // ==========
  const video = document.getElementById('video');
  const overlayCanvas = document.getElementById('overlayCanvas');
  const ctx = overlayCanvas.getContext('2d');

  const frameCanvas = document.createElement('canvas');
  const frameCtx = frameCanvas.getContext('2d', { willReadFrequently: true });

  const workCanvas = document.createElement('canvas');
  const workCtx = workCanvas.getContext('2d', { willReadFrequently: true });

  // ==========
  // Worker (zxing-wasm)
  // ==========
  let worker = null;
  let workerReady = false;
  let reqId = 1;
  const pending = new Map(); // id -> {resolve, reject}

  function initWorker() {
    if (worker) return;

    // ※ file:// だと Worker が死ぬことが多いです（HTTPS/localhost 推奨）
    worker = new Worker('./zxing_worker.js');

    worker.onmessage = (ev) => {
      const msg = ev.data || {};
      if (msg.type === 'ready') {
        workerReady = true;
        document.getElementById('bootMsg').innerText = "✅ デコーダー準備OK";
console.log('=== ZXingReader --help ===', msg.helpOutput); // ★        
return;
      }
      if (msg.type === 'resp') {
        const p = pending.get(msg.id);
        if (!p) return;
        pending.delete(msg.id);
        if (msg.ok) p.resolve(msg.payload);
        else p.reject(new Error(msg.error || "decode failed"));
        return;
      }
      if (msg.type === 'fatal') {
        document.getElementById('bootMsg').innerText = "❌ Worker初期化失敗: " + (msg.error || "");
      }
    };

    worker.onerror = (e) => {
      document.getElementById('bootMsg').innerText = "❌ Workerエラー: " + e.message;
    };
  }

  function decodeInWorker(imageData, options) {
    return new Promise((resolve, reject) => {
      if (!workerReady) return reject(new Error("worker not ready"));
      const id = reqId++;
      pending.set(id, { resolve, reject });

      worker.postMessage({
        type: 'req',
        id,
        width: imageData.width,
        height: imageData.height,
        data: imageData.data.buffer,
        options: options || null,
      }, [imageData.data.buffer]);
    });
  }

  // ========== ★追加：管理部16bit 取得＆表示 ==========
  function toUInt16(v) {
    return (Number(v) >>> 0) & 0xFFFF;
  }
  function toBin16(v) {
    return toUInt16(v).toString(2).padStart(16, '0');
  }
  function toHex4(v) {
    return toUInt16(v).toString(16).toUpperCase().padStart(4, '0');
  }

  // Workerが返すオブジェクトのどこに入るかは実装差があるので「全部見る」
  // - best.management16
  // - best.extra.management16
  // - best.extras.management16
  // - best.extra["management16"]
  // - best.extras["management16"]
  function pickManagement16FromBest(best) {
    const raw =
      best?.management16 ??
      best?.extra?.management16 ??
      best?.extras?.management16 ??
      best?.extra?.["management16"] ??
      best?.extras?.["management16"] ??
      null;

    if (raw === null || raw === undefined || raw === "") return null;

    // 受け取り形式を許容：
    //  - number
    //  - "43690"
    //  - "0xA1B2"
    //  - "A1B2"
    //  - "0101...(16bit)"
    const s = String(raw).trim();

    if (/^[01]{16}$/.test(s)) {
      const v = parseInt(s, 2);
      return { value: v, bin: s, hex: "0x" + toHex4(v), dec: String(v) };
    }
    if (/^0x[0-9a-fA-F]{1,4}$/.test(s)) {
      const v = parseInt(s, 16);
      return { value: v, bin: toBin16(v), hex: "0x" + toHex4(v), dec: String(toUInt16(v)) };
    }
    if (/^[0-9a-fA-F]{1,4}$/.test(s)) {
      const v = parseInt(s, 16);
      return { value: v, bin: toBin16(v), hex: "0x" + toHex4(v), dec: String(toUInt16(v)) };
    }
    if (/^\d+$/.test(s)) {
      const v = parseInt(s, 10);
      return { value: v, bin: toBin16(v), hex: "0x" + toHex4(v), dec: String(toUInt16(v)) };
    }

    // 形式不明：文字として表示だけ
    return { value: null, bin: s, hex: s, dec: s };
  }

  function renderMgmt16(m) {
    if (!m) return "未取得（workerがmanagement16を返していない）";
    if (m.value === null) return `${m.bin}`;
    return `${m.hex} / ${m.bin} / ${m.dec}`;
  }

  // ========== State ==========
  let isProcessing = false;
  let isScanning = false;
  let lastDetectTime = 0;

  let scanIntervalMs = 120;
  let emaDecodeMs = 0;
  let emaTotalMs  = 0;
  const EMA_ALPHA = 0.2;

  let firstFailStreak = 0;
  let secondFailStreak = 0;
  let decodeLevel = 0;
  let secondSearchLevel = 0;

  function clampInt(v, a, b) { return Math.max(a, Math.min(b, v | 0)); }
  function updateScanInterval() {
    const base = emaTotalMs || 0;
    const target = Math.round(base * 1.2 + 10);
    scanIntervalMs = clampInt(target, 90, 320);
  }

  let firstQR = null;
  let secondQR = null;

  // ========== Camera ==========
  async function startCamera() {
    try {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error("このブラウザは getUserMedia に対応していません");
      }

      if (video.srcObject) {
        try { video.srcObject.getTracks().forEach(t => t.stop()); } catch (_) {}
        video.srcObject = null;
      }

      const candidates = [
        { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false },
        { video: { facingMode: { ideal: 'environment' } }, audio: false },
        { video: true, audio: false },
      ];

      let stream = null;
      let lastErr = null;
      for (const c of candidates) {
        try { stream = await navigator.mediaDevices.getUserMedia(c); break; }
        catch (e) { lastErr = e; }
      }
      if (!stream) throw lastErr || new Error("getUserMedia failed");

      video.srcObject = stream;

      await new Promise((resolve) => {
        const to = setTimeout(resolve, 1500);
        video.onloadedmetadata = () => { clearTimeout(to); resolve(); };
      });

      await video.play();

      // ★ここでキャンバス初期サイズを確定
      if (video.videoWidth && video.videoHeight) {
        overlayCanvas.width = video.videoWidth;
        overlayCanvas.height = video.videoHeight;
      }

      return true;
    } catch (err) {
      console.error(err);
      alert("カメラを起動できません。\n権限/HTTPS/他アプリ使用中を確認してください。\nエラー: " + (err?.message || err));
      return false;
    }
  }

  // ========== QR Twin logic ==========
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  function getCenter(points) {
    if (!points || points.length === 0) return { x: 0, y: 0 };
    let sx = 0, sy = 0;
    for (const p of points) { sx += p.x; sy += p.y; }
    return { x: sx / points.length, y: sy / points.length };
  }

  function bboxFromPoints(points) {
    if (!points || points.length === 0) return null;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of points) {
      minX = Math.min(minX, p.x);
      minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x);
      maxY = Math.max(maxY, p.y);
    }
    const pad = 14;
    return {
      x: Math.max(0, minX - pad),
      y: Math.max(0, minY - pad),
      w: (maxX - minX) + pad * 2,
      h: (maxY - minY) + pad * 2
    };
  }

  function mapWorkerResultToItem(best, sx = 0, sy = 0, sw = 0, sh = 0, scale = 1) {
    let pts = [];
    if (best && best.position) {
      const pos = best.position;
      const cand = [pos.topLeft, pos.topRight, pos.bottomRight, pos.bottomLeft].filter(Boolean);
      pts = cand.map(p => ({
        x: (p.x / scale) + sx,
        y: (p.y / scale) + sy
      }));
    }

    let center = getCenter(pts);
    let bb = bboxFromPoints(pts);

    if (!bb) {
      bb = { x: sx, y: sy, w: sw, h: sh };
      center = { x: sx + sw / 2, y: sy + sh / 2 };
    }

    let size = Math.max(bb.w, bb.h);
    size = Math.max(120, size);

    // ★管理部16bitをここで確定して持たせる
    const mgmt = pickManagement16FromBest(best);

    return {
      text: best?.text || "",
      points: pts,
      center,
      bbox: bb,
      size,
      management16: mgmt,   // ★追加
      meta: best || null
    };
  }

  function getDecodeOpts(level) {
    if (level === 0) return { formats: ["QRCode"], tryHarder: false, tryRotate: false, tryInvert: false };
    if (level === 1) return { formats: ["QRCode"], tryHarder: false, tryRotate: true,  tryInvert: false };
    return               { formats: ["QRCode"], tryHarder: true,  tryRotate: true,  tryInvert: true  };
  }

  async function decodeRegion(frameW, frameH, sx, sy, sw, sh, scale = 1.0) {
    sx = clamp(sx, 0, frameW - 2);
    sy = clamp(sy, 0, frameH - 2);
    sw = clamp(sw, 2, frameW - sx);
    sh = clamp(sh, 2, frameH - sy);

    const tw = Math.max(64, Math.floor(sw * scale));
    const th = Math.max(64, Math.floor(sh * scale));

    workCanvas.width = tw;
    workCanvas.height = th;
    workCtx.clearRect(0, 0, tw, th);
    workCtx.drawImage(frameCanvas, sx, sy, sw, sh, 0, 0, tw, th);

    const img = workCtx.getImageData(0, 0, tw, th);
    const opts = getDecodeOpts(decodeLevel);

    const t0 = performance.now();
    let payload;
    try {
      payload = await decodeInWorker(img, opts);
    } catch (e) {
      document.getElementById('perfMsg').innerText = `decode(worker) ERROR: ${e?.message || e}`;
      return null;
    }
    const t1 = performance.now();

    const wms = Number(payload.ms || 0);
    const tms = (t1 - t0);

    emaDecodeMs = emaDecodeMs ? (emaDecodeMs * (1 - EMA_ALPHA) + wms * EMA_ALPHA) : wms;
    emaTotalMs  = emaTotalMs  ? (emaTotalMs  * (1 - EMA_ALPHA) + tms * EMA_ALPHA) : tms;

    updateScanInterval();
    document.getElementById('perfMsg').innerText =
      `decodeL=${decodeLevel} scan=${scanIntervalMs}ms | worker=${wms.toFixed(1)}ms ema=${emaDecodeMs.toFixed(1)} | total=${tms.toFixed(1)}ms ema=${emaTotalMs.toFixed(1)}`;

    if (!payload.found) return null;

    const best = payload.results[0];
    return mapWorkerResultToItem(best, sx, sy, sw, sh, scale);
  }

  async function findFirstRobust(W, H) {
    const fullScales = [1.0, 0.86, 1.18];
    for (const sc of fullScales) {
      const got = await decodeRegion(W, H, 0, 0, W, H, sc);
      if (got) return got;
    }

    const tileRatios = [0.72, 0.62];
    const scales = [1.0, 1.18];

    for (const tr of tileRatios) {
      const tw = Math.floor(W * tr);
      const th = Math.floor(H * tr);

      const positions = [
        { x: (W - tw) / 2, y: (H - th) / 2 },
        { x: 0, y: 0 },
        { x: W - tw, y: 0 },
        { x: 0, y: H - th },
        { x: W - tw, y: H - th },
        { x: (W - tw) / 2, y: 0 },
        { x: (W - tw) / 2, y: H - th },
        { x: 0, y: (H - th) / 2 },
        { x: W - tw, y: (H - th) / 2 },
      ];

      for (const pos of positions) {
        for (const sc of scales) {
          const got = await decodeRegion(W, H, Math.floor(pos.x), Math.floor(pos.y), tw, th, sc);
          if (got) return got;
        }
      }
    }

    return null;
  }

  // ★追加：領域をマスク（= firstのbboxを避けて2回目を探す）
  async function decodeFullFrameExcludingFirst(first, W, H) {
    if (!first?.bbox) return null;

    // first bbox を少し広げて“除外”
    const pad = 20;
    const ex = {
      x: Math.max(0, first.bbox.x - pad),
      y: Math.max(0, first.bbox.y - pad),
      w: Math.min(W, first.bbox.w + pad * 2),
      h: Math.min(H, first.bbox.h + pad * 2),
    };

    // 画面をタイル分割して「除外領域と被らないタイル」だけ decode
    const tileRatios = [0.72, 0.62];
    const scales = [1.0, 1.18];

    for (const tr of tileRatios) {
      const tw = Math.floor(W * tr);
      const th = Math.floor(H * tr);

      const positions = [
        { x: (W - tw) / 2, y: (H - th) / 2 },
        { x: 0, y: 0 }, { x: W - tw, y: 0 }, { x: 0, y: H - th }, { x: W - tw, y: H - th },
        { x: (W - tw) / 2, y: 0 }, { x: (W - tw) / 2, y: H - th },
        { x: 0, y: (H - th) / 2 }, { x: W - tw, y: (H - th) / 2 },
      ];

      for (const pos of positions) {
        const sx = Math.floor(pos.x), sy = Math.floor(pos.y);

        // 除外bboxと大きく重なるタイルはスキップ
        const overlapX = Math.max(0, Math.min(sx + tw, ex.x + ex.w) - Math.max(sx, ex.x));
        const overlapY = Math.max(0, Math.min(sy + th, ex.y + ex.h) - Math.max(sy, ex.y));
        const overlapArea = overlapX * overlapY;
        const tileArea = tw * th;
        if (tileArea > 0 && overlapArea / tileArea > 0.35) continue; // 35%以上被ればスキップ

        for (const sc of scales) {
          const got = await decodeRegion(W, H, sx, sy, tw, th, sc);
          if (got && isDifferentSecondCandidate(first, got, W)) return got;
        }
      }
    }

    return null;
  }

  // ★追加：距離とサイズ
  function dist2(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y;
    return dx*dx + dy*dy;
  }
  function getDistance(a, b) {
    return Math.sqrt(dist2(a,b));
  }

  // points があれば「上辺長」を qrSize として使う（無ければ bbox から推定）
  function estimateQrSize(item) {
    if (item?.points && item.points.length >= 2) {
      return getDistance(item.points[0], item.points[1]);
    }
    if (item?.bbox) return Math.max(item.bbox.w, item.bbox.h);
    if (item?.size) return item.size;
    return 0;
  }

  // ★追加：あなたの“別QR判定条件”をそのまま関数化
  function isDifferentSecondCandidate(first, cand, frameW) {
    if (!first || !cand) return false;
    if (!first.center || !cand.center) return false;

    // 条件(1) テキストが違う
    if (cand.text && first.text && cand.text !== first.text) return true;

    // 条件(2) テキストが同じでも距離が離れていれば別QR
    const d = getDistance(first.center, cand.center);
    const qrSize = estimateQrSize(cand) || estimateQrSize(first) || 0;

    // ZXing版と同じ：min(画面幅*0.1, qrSize*0.45)
    const distanceThreshold = Math.min(frameW * 0.1, qrSize * 0.45);

    return d > distanceThreshold;
  }

  async function findSecondByDistance(first, W, H) {
    if (!first || !first.center) return null;

    const cx = first.center.x;
    const cy = first.center.y;
    const base = Math.max(first.size || 0, 180);
    const level = secondSearchLevel;

    let radiiKs, N, roiSizes, scales;

    if (level === 0) {
      radiiKs = [1.0, 1.5];
      N = 8;
      roiSizes = [clamp(base * 1.35, 160, 560)];
      scales = [1.0, 1.18];
    } else if (level === 1) {
      radiiKs = [0.9, 1.2, 1.55, 1.9];
      N = 14;
      roiSizes = [
        clamp(base * 1.35, 160, 600),
        clamp(base * 1.70, 220, 720),
      ];
      scales = [1.18, 1.0, 0.86];
    } else {
      radiiKs = [1.0, 1.5, 2.1, 2.7, 3.2];
      N = 18;
      roiSizes = [
        clamp(base * 1.70, 220, 760),
        clamp(base * 2.20, 320, 940),
      ];
      scales = [1.18, 1.0, 0.86];
    }

    const angles = [];
    for (let i = 0; i < N; i++) angles.push((Math.PI * 2 * i) / N);

    for (const roiSize of roiSizes) {
      for (const k of radiiKs) {
        const r = base * k;

        for (const ang of angles) {
          const tx = cx + Math.cos(ang) * r;
          const ty = cy + Math.sin(ang) * r;

          const sx = Math.floor(tx - roiSize / 2);
          const sy = Math.floor(ty - roiSize / 2);

          for (const sc of scales) {
            const item = await decodeRegion(W, H, sx, sy, roiSize, roiSize, sc);

            // ★テキスト一致でも「距離」で別QRと確定できる
            if (item && isDifferentSecondCandidate(first, item, W)) return item;
          }
        }
      }
    }

    return null;
  }

  // ========== Main scan loop ==========
  async function processOneFrame() {
    const W = overlayCanvas.width;
    const H = overlayCanvas.height;

    frameCanvas.width = W;
    frameCanvas.height = H;
    frameCtx.drawImage(video, 0, 0, W, H);

    if (!firstQR) {
      const got = await findFirstRobust(W, H);
      if (got) {
        firstQR = got;
        firstFailStreak = 0;
        decodeLevel = 0;
        updateUI();
      } else {
        firstFailStreak++;
        if (firstFailStreak < 3) decodeLevel = 0;
        else if (firstFailStreak < 8) decodeLevel = 1;
        else decodeLevel = 2;
      }
    } else {
      const got = await decodeRegion(W, H, 0, 0, W, H, 0.92);

      if (got) {
        // ★同一フレームで“もう一方”が取れたら固定せず second に回す
        if (!secondQR && isDifferentSecondCandidate(firstQR, got, W)) {
          secondQR = got;
          secondFailStreak = 0;
          secondSearchLevel = 0;
          updateUI();
        }
        // ★同じものなら従来通り first を追跡更新
        else if (got.text === firstQR.text) {
          firstQR = got;
          updateUI();
        }
      }
    }

    if (firstQR && !secondQR) {
      if (secondFailStreak < 3) secondSearchLevel = 0;
      else if (secondFailStreak < 8) secondSearchLevel = 1;
      else secondSearchLevel = 2;

      // ★(A) まず「first領域を避けて全体から2個目」を拾う
      let found = await decodeFullFrameExcludingFirst(firstQR, W, H);

      // ★(B) ダメなら従来の距離探索
      if (!found) {
        found = await findSecondByDistance(firstQR, W, H);
      }

      if (found) {
        secondQR = found;
        secondFailStreak = 0;
        secondSearchLevel = 0;
        updateUI();
      } else {
        secondFailStreak++;
      }
    }

    ctx.clearRect(0, 0, W, H);
    if (firstQR?.bbox) drawBBox(firstQR.bbox, '#00E676');
    if (secondQR?.bbox) drawBBox(secondQR.bbox, '#29B6F6');

    if (firstQR && secondQR) {
      showResultScreen();
      isScanning = false;
    }
  }

  function scanLoop() {
    if (!isScanning) return;

    // 動的リサイズ（metadata後にサイズが入る）
    if (video.videoWidth && overlayCanvas.width !== video.videoWidth) {
      overlayCanvas.width = video.videoWidth;
      overlayCanvas.height = video.videoHeight;
    }

    const now = Date.now();
    if (!isProcessing && (now - lastDetectTime) > scanIntervalMs && video.readyState >= 2 && workerReady) {
      isProcessing = true;
      lastDetectTime = now;

      processOneFrame()
        .catch(() => {})
        .finally(() => { isProcessing = false; });
    }

    requestAnimationFrame(scanLoop);
  }

  function drawBBox(bb, color) {
    if (!bb) return;
    ctx.save();
    ctx.lineWidth = 6;
    ctx.strokeStyle = color;
    ctx.fillStyle = color + "22";
    ctx.strokeRect(bb.x, bb.y, bb.w, bb.h);
    ctx.fillRect(bb.x, bb.y, bb.w, bb.h);
    ctx.restore();
  }

  // ★変更：管理部16bitも表示
  function updateUI() {
    if (firstQR) {
      document.getElementById('text1').innerText = firstQR.text || "";
      document.getElementById('mgmt1').innerText = renderMgmt16(firstQR.management16);
    }
    if (secondQR) {
      document.getElementById('text2').innerText = secondQR.text || "";
      document.getElementById('mgmt2').innerText = renderMgmt16(secondQR.management16);
    }
  }

  function formatResultText(text) {
    if (/^https?:\/\//i.test(text)) {
      return `<a href="${text}" target="_blank" rel="noopener noreferrer" style="color:#03DAC6;text-decoration:underline;font-weight:bold;">${text}</a>`;
    }
    const div = document.createElement('div');
    div.innerText = text;
    return div.innerHTML;
  }

  // ★変更：完了画面にも管理部16bitを表示
  function showResultScreen() {
    if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
    document.getElementById('cameraContainer').style.display = 'none';
    document.getElementById('statusPanel').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';

    document.getElementById('finalText1').innerHTML = formatResultText(firstQR.text);
    document.getElementById('finalText2').innerHTML = formatResultText(secondQR.text);

    document.getElementById('finalMgmt1').innerText = renderMgmt16(firstQR.management16);
    document.getElementById('finalMgmt2').innerText = renderMgmt16(secondQR.management16);
  }

  function goBack() {
    firstQR = null;
    secondQR = null;

    firstFailStreak = 0;
    secondFailStreak = 0;
    decodeLevel = 0;
    secondSearchLevel = 0;
    emaDecodeMs = 0;
    emaTotalMs = 0;
    scanIntervalMs = 120;

    document.getElementById('text1').innerText = "未検出";
    document.getElementById('text2').innerText = "未検出";
    document.getElementById('mgmt1').innerText = "未取得";
    document.getElementById('mgmt2').innerText = "未取得";
    document.getElementById('finalMgmt1').innerText = "未取得";
    document.getElementById('finalMgmt2').innerText = "未取得";

    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('cameraContainer').style.display = 'block';
    document.getElementById('statusPanel').style.display = 'block';
    ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    isScanning = true;
    requestAnimationFrame(scanLoop);
  }

  // ========== Start ==========
  async function startApp() {
    const startBtn = document.getElementById('startBtn');
    startBtn.disabled = true;
    startBtn.innerText = "準備中...";

    try {
      initWorker();

      // Worker ready を待つ（最大 3秒）
      const t0 = Date.now();
      while (!workerReady) {
        if (Date.now() - t0 > 3000) {
          throw new Error("デコーダー初期化がタイムアウトしました（zxing_worker.js / wasm の配置とパスを確認）");
        }
        await new Promise(r => setTimeout(r, 50));
      }

      const ok = await startCamera();
      if (!ok) throw new Error("カメラ起動失敗");

      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('cameraContainer').style.display = 'block';
      document.getElementById('statusPanel').style.display = 'block';

      isScanning = true;
      requestAnimationFrame(scanLoop);
    } catch (e) {
      console.error(e);
      alert("起動に失敗: " + (e?.message || e));
      startBtn.disabled = false;
      startBtn.innerText = "📷 カメラを起動する";
    }
  }

  window.startApp = startApp;
  window.goBack = goBack;
</script>
</body>
